<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股相似走势检索</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6fa; color: #333; }
  .header { background: #1a1a2e; color: #fff; padding: 20px 32px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p { font-size: 13px; color: #aaa; margin-top: 4px; }
  .container { max-width: 860px; margin: 32px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 24px; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 13px; color: #666; font-weight: 500; }
  input, select { border: 1px solid #dde; border-radius: 6px; padding: 8px 12px; font-size: 14px; outline: none; }
  input:focus, select:focus { border-color: #4a6cf7; }
  input[type=text] { width: 160px; }
  select { width: 180px; }
  input[type=number] { width: 80px; }
  button { background: #4a6cf7; color: #fff; border: none; border-radius: 6px; padding: 9px 24px; font-size: 14px; cursor: pointer; transition: background .15s; white-space: nowrap; }
  button:hover { background: #3a5ce7; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .query-info { font-size: 13px; color: #555; margin-bottom: 16px; }
  .query-info span { font-weight: 600; color: #222; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #f8f9ff; color: #555; font-weight: 600; padding: 10px 14px; text-align: left; border-bottom: 2px solid #eef; }
  td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbff; }
  .rank { color: #999; font-size: 13px; }
  .rank-top { color: #e67e22; font-weight: 700; }
  .code { font-family: monospace; font-size: 13px; color: #4a6cf7; }
  .sim-bar { display: flex; align-items: center; gap: 8px; }
  .sim-bar .bar { height: 6px; background: #4a6cf7; border-radius: 3px; }
  .sim-val { font-size: 13px; color: #333; min-width: 44px; }
  .empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }
  .error { color: #e74c3c; background: #fff5f5; border: 1px solid #fcc; border-radius: 6px; padding: 12px 16px; font-size: 13px; }
  .loading { text-align: center; color: #888; padding: 40px 0; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #ccc; border-top-color: #4a6cf7; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 10px; background: #eef0ff; color: #4a6cf7; margin-left: 6px; }
</style>
</head>
<body>

<div class="header">
  <h1>A股相似走势检索</h1>
  <p>基于 Transformer 对比学习 · 双通道架构（价格 + 成交量）</p>
</div>

<div class="container">
  <div class="card">
    <div class="form-row">
      <div class="form-group">
        <label>股票代码</label>
        <input type="text" id="code" placeholder="如 000001" maxlength="6">
      </div>
      <div class="form-group">
        <label>模型</label>
        <select id="window">
          <option value="20">w20-dct（20日·双通道）</option>
          <option value="30">w30（30日·单通道）</option>
        </select>
      </div>
      <div class="form-group">
        <label>返回数量</label>
        <input type="number" id="topk" value="10" min="1" max="50">
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button id="searchBtn" onclick="doSearch()">查询</button>
      </div>
    </div>
  </div>

  <div id="result"></div>
</div>

<script>
async function doSearch() {
  const code = document.getElementById('code').value.trim();
  if (!code) { alert('请输入股票代码'); return; }
  const win = document.getElementById('window').value;
  const topk = document.getElementById('topk').value;
  const btn = document.getElementById('searchBtn');
  const result = document.getElementById('result');

  btn.disabled = true;
  result.innerHTML = '<div class="card loading"><span class="spinner"></span>查询中...</div>';

  try {
    const res = await fetch(`/search?code=${code}&window=${win}&top_k=${topk}&mode=current`);
    const data = await res.json();
    if (!res.ok) {
      result.innerHTML = `<div class="card"><div class="error">${data.detail || '查询失败'}</div></div>`;
      return;
    }
    renderResult(data, win);
  } catch(e) {
    result.innerHTML = `<div class="card"><div class="error">网络错误：${e.message}</div></div>`;
  } finally {
    btn.disabled = false;
  }
}

function renderResult(data, win) {
  const q = data.query;
  const rows = data.results;
  const maxSim = rows.length > 0 ? rows[0].similarity : 1;
  const modelLabel = win == 20 ? 'w20-dct' : 'w30';

  const info = `
    <div class="query-info">
      查询：<span>${q.name}（${q.code}）</span>
      &nbsp;|&nbsp; 窗口：<span>${q.window_start} ~ ${q.window_end}</span>
      &nbsp;|&nbsp; 模型：<span>${modelLabel}</span>
      ${win == 20 ? '<span class="badge">双通道</span>' : ''}
    </div>`;

  if (rows.length === 0) {
    document.getElementById('result').innerHTML = `<div class="card">${info}<div class="empty">暂无结果</div></div>`;
    return;
  }

  const trs = rows.map(r => {
    const rankClass = r.rank <= 3 ? 'rank-top' : 'rank';
    const barW = Math.round((r.similarity / maxSim) * 100);
    return `<tr>
      <td class="${rankClass}">${r.rank}</td>
      <td class="code">${r.code}</td>
      <td>${r.name}</td>
      <td>
        <div class="sim-bar">
          <div class="bar" style="width:${barW}px"></div>
          <span class="sim-val">${r.similarity.toFixed(4)}</span>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('result').innerHTML = `
    <div class="card">
      ${info}
      <table>
        <thead><tr><th>排名</th><th>代码</th><th>名称</th><th>相似度</th></tr></thead>
        <tbody>${trs}</tbody>
      </table>
    </div>`;
}

document.getElementById('code').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
