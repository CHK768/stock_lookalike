# 数据参数
data:
  window_size: 30          # 滑动窗口天数
  max_suspend_days: 5      # 最多允许停牌天数
  lookback_days: 120       # 默认下载历史天数
  raw_dir: data/raw
  stock_list_file: data/stock_list.csv
  index_dir: data/index

# 模型参数
model:
  model_type: dual_channel  # single | dual_channel
  input_dim: 5             # OHLCV（single 通道用）
  d_model: 64
  nhead: 4
  num_layers: 3
  ffn_dim: 256
  dropout: 0.1
  embed_dim: 128           # 最终embedding维度

# 训练参数
train:
  batch_size: 1024
  lr: 1.2e-3
  weight_decay: 1.0e-4
  epochs: 50
  early_stopping_patience: 10
  temperature: 0.07        # NT-Xent temperature
  checkpoint_dir: checkpoints
  mixed_precision: true

# 检索参数
search:
  top_k: 10
